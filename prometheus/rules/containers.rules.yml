# Container-level rules (cAdvisor). Always-on services: a container that
# restarts or disappears is an incident, not noise.
groups:
  - name: containers
    rules:
      - alert: ContainerRestarting
        expr: count by (name) (changes(container_start_time_seconds{name!=""}[15m])) > 2
        for: 0m
        labels:
          severity: warn
        annotations:
          summary: "Container restart-looping"
          description: "Container {{ $labels.name }} restarted more than twice in 15 minutes — check its logs; crash-loops mask real outages."

      - alert: ContainerGone
        expr: time() - container_last_seen{name!=""} > 120
        for: 0m
        labels:
          severity: warn
        annotations:
          summary: "Container disappeared"
          description: "Container {{ $labels.name }} has not been seen by cAdvisor for 2 minutes. Expected for one-shot jobs, an incident for always-on services."

      - alert: ContainerOOMKilled
        expr: increase(container_oom_events_total{name!=""}[15m]) > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "Container hit the OOM killer"
          description: "Container {{ $labels.name }} was OOM-killed in the last 15 minutes; it likely lost in-flight state."

      - alert: ContainerNearMemoryLimit
        expr: |
          container_memory_usage_bytes{name!=""}
            / container_spec_memory_limit_bytes{name!=""} > 0.90
          and container_spec_memory_limit_bytes{name!=""} > 0
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "Container above 90% of its memory limit"
          description: "Container {{ $labels.name }} is at {{ $value | humanizePercentage }} of its memory limit and will be OOM-killed if it keeps growing."
